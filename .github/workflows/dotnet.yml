# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: dotnet

permissions: read-all

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build ArcNET.slnx -c Release

      - name: Test
        run: dotnet Build.cs test

  package-compat:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: List packages
        run: dotnet Build.cs list-packages

      - name: Pack packages
        run: dotnet Build.cs pack

  coverage:
    runs-on: windows-latest
    needs: build-and-test
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Build coverage binaries
        run: dotnet build ArcNET.slnx -c Release

      - name: Collect coverage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/TestResults | Out-Null

          $coverageRuns = @(
            @{ Name = 'ArcNET.Core.Tests'; Project = 'src/Core/ArcNET.Core.Tests' }
            @{ Name = 'ArcNET.GameObjects.Tests'; Project = 'src/GameObjects/ArcNET.GameObjects.Tests' }
            @{ Name = 'ArcNET.Formats.Tests'; Project = 'src/Formats/ArcNET.Formats.Tests' }
            @{ Name = 'ArcNET.GameData.Tests'; Project = 'src/GameData/ArcNET.GameData.Tests' }
            @{ Name = 'ArcNET.Archive.Tests'; Project = 'src/Archive/ArcNET.Archive.Tests' }
            @{ Name = 'ArcNET.Patch.Tests'; Project = 'src/Patch/ArcNET.Patch.Tests' }
            @{ Name = 'ArcNET.BinaryPatch.Tests'; Project = 'src/BinaryPatch/ArcNET.BinaryPatch.Tests' }
            @{ Name = 'ArcNET.Editor.Tests'; Project = 'src/Editor/ArcNET.Editor.Tests' }
            @{ Name = 'ArcNET.DocTest'; Project = 'src/DocTest/ArcNET.DocTest' }
          )

          foreach ($coverageRun in $coverageRuns) {
            Write-Host "Collecting coverage for $($coverageRun.Name) from $($coverageRun.Project)"
            dotnet dotnet-coverage collect "dotnet run --project $($coverageRun.Project) -c Release --no-build --no-restore" --output "artifacts/TestResults/$($coverageRun.Name).coverage.cobertura.xml" --output-format cobertura
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-reports
          path: artifacts/TestResults/*.coverage.cobertura.xml
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354
        with:
          files: artifacts/TestResults/*.coverage.cobertura.xml
          fail_ci_if_error: true
          verbose: true

  format:
    runs-on: windows-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: CSharpier check
        run: dotnet csharpier check .

      - name: dotnet format style
        run: dotnet format style ArcNET.slnx --verify-no-changes

      - name: dotnet format analyzers
        run: dotnet format analyzers ArcNET.slnx --verify-no-changes
